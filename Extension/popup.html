<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShopMind AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      background: #0d0d14;
      color: white;
      font-family: 'DM Sans', sans-serif;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .logo {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 8px 24px rgba(99,102,241,0.5);
      margin-top: 4px;
    }
    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 17px; font-weight: 700;
      letter-spacing: -0.3px;
    }
    .desc {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      line-height: 1.6;
    }
    .status {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-align: center;
    }
    .status.ok { color: #34d399; border-color: rgba(52,211,153,0.2); background: rgba(52,211,153,0.05); }
    .status.err { color: #f87171; border-color: rgba(248,113,113,0.2); background: rgba(248,113,113,0.05); }
    .open-btn {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(99,102,241,0.4);
    }
    .open-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .note { font-size: 10px; color: rgba(255,255,255,0.2); text-align: center; }
    .divider { width: 100%; height: 1px; background: rgba(255,255,255,0.06); }
  </style>
</head>
<body>
  <div class="logo">✦</div>
  <div class="brand">ShopMind AI</div>
  <div class="desc">AI-powered shopping advisor.<br>Look for the floating button on product pages.</div>
  <div class="divider"></div>
  <div id="site-status" class="status">Checking page…</div>
  <button class="open-btn" id="open-btn">Open Assistant on Page</button>
  <div id="api-status" class="status">Checking backend…</div>
  <div class="note">Navigate to Amazon or Flipkart and click the ✦ button</div>

  <script src="popup.js"></script>
</body>
</html>
